version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - prealloc
    - unconvert
    - unparam
  settings:
    gocritic:
      disabled-tags:
        - style
        - experimental
        - opinionated
  exclusions:
    paths:
      - vendor

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
